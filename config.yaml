api:
  api_key_env: OPENAI_API_KEY
  base_url: http://new-api.hntz18.com/v1
  model: gpt-5.5
  provider: openai
privacy:
  ignore:
  - .env
  - .env.*
  - node_modules/
  - dist/
  redact_patterns:
  - Bearer\s+[A-Za-z0-9._-]+
  - AKIA[0-9A-Z]{16}
reports:
  output_dir: ./.luna-reports
review:
  apply_enabled: false
  confirm_before_fix: true
  language: zh
  max_diff_chars: 120000
  project_type: frontend
skills: []
backend:
  enabled: true
  languages:
    - csharp
  max_depth: 4
